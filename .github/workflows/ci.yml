name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

  test-and-build:
    runs-on: ubuntu-latest
    needs: workflow-lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q

      - name: Remove stale build artifacts
        run: rm -rf dist .venv-smoke-cli

      - name: Build distributions
        run: uv run python -m build

      - name: Verify LICENSE included in sdist
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import tarfile

          dist = sorted(Path("dist").glob("*.tar.gz"))
          assert dist, "missing sdist"
          with tarfile.open(dist[-1], "r:gz") as tf:
              names = tf.getnames()
          assert any(name.endswith("/LICENSE") for name in names), names
          PY

      - name: Smoke install built wheel
        run: |
          uv run python scripts/smoke_installed_cli.py --dist-dir dist --venv-dir .venv-smoke-cli
