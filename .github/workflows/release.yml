name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release (e.g., v0.1.1)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Validate version tag format
        run: |
          case "${TAG}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Invalid version tag: ${TAG}" >&2
              exit 1
              ;;
          esac

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync

      - name: Verify release gate
        run: |
          uv run pytest -q
          uv run python scripts/docstring_coverage.py --min-percent 100
          rm -rf dist .venv-smoke-cli
          uv run python -m build
          uv run python scripts/smoke_installed_cli.py --dist-dir dist --venv-dir .venv-smoke-cli

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Generate build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: dist/*

      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify dist/*.whl --owner ${{ github.repository_owner }}
          gh attestation verify dist/*.tar.gz --owner ${{ github.repository_owner }}

      - name: Create or update GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
          else
            gh release create "${TAG}" dist/* --verify-tag --generate-notes --title "${TAG}"
          fi
